<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Liquid Balls UI</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  overflow: hidden;
}
.fade-out {
  opacity: 0;
  transform: scale(0.5);
  pointer-events: none;
  transition: all 0.5s ease;
}
/* LIQUID BALL */
.ball {
  width: 130px;
  height: 130px;
  background: black;
  position: absolute;
  top: -200px;
  border-radius: 50%;
  overflow: hidden;
  cursor: pointer;

  display: flex;
  align-items: center;
  justify-content: center;

  transition: transform 0.3s ease, border 0.3s ease;
}

/* IMAGE */
.ball img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  transition: opacity 0.4s ease;
}

/* HOVER */
.ball:hover {
  transform: scale(1.08);
  border: 3px solid yellow;
}

.ball:hover img {
  opacity: 1;
}

/* LIQUID DROP ANIMATION */
@keyframes liquidDrop {
  0% {
    top: -200px;
    transform: scaleY(1.2) scaleX(0.8);
    border-radius: 60% 40% 50% 50%;
  }

  50% {
    transform: scaleY(1) scaleX(1);
  }

  80% {
    top: 65vh;
    transform: scaleY(0.7) scaleX(1.3); /* squash */
    border-radius: 40% 60% 50% 50%;
  }

  90% {
    transform: scaleY(1.2) scaleX(0.8); /* bounce stretch */
  }

  100% {
    top: 60vh;
    transform: scale(1);
    border-radius: 50%;
  }
}

/* APPLY */
#ball1 {
  left: 35%;
  animation: liquidDrop 1.2s cubic-bezier(.2,.8,.2,1) forwards;
}

#ball2 {
  left: 55%;
  animation: liquidDrop 1.4s cubic-bezier(.2,.8,.2,1) forwards;
}

/* EXPAND */
.expand {
  position: fixed !important;
  top: 50% !important;
  left: 50% !important;
  transform: translate(-50%, -50%) scale(10);
  z-index: 20;
  transition: all 0.7s cubic-bezier(.2,.8,.2,1);
}

/* BLACK SCREEN */
.black {
  background: black !important;
  transition: background 0.6s ease;
}

/* CONTENT */
.content {
  position: fixed;
  color: white;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: none;
  z-index: 30;
  text-align: center;
}

.show {
  display: block;
}

/* GLOW */
.ball:hover {
  box-shadow: 0 0 25px rgba(255,255,0,0.5);
}
</style>
</head>

<body class="bg-white">

<!-- BALLS -->
<div id="ball1" class="ball">
  <img src="https://source.unsplash.com/300x300/?nature">
</div>

<div id="ball2" class="ball">
  <img src="https://source.unsplash.com/300x300/?technology">
</div>

<!-- CONTENT -->
<div id="content1" class="content">
  <h1 class="text-4xl font-bold mb-4">Nature 🌿</h1>
  <p>Data for Ball 1</p>
</div>

<div id="content2" class="content">
  <h1 class="text-4xl font-bold mb-4">Technology 💻</h1>
  <p>Data for Ball 2</p>
</div>

<script>const ball1 = document.getElementById("ball1");
const ball2 = document.getElementById("ball2");

const content1 = document.getElementById("content1");
const content2 = document.getElementById("content2");

let clicked = false; // prevent double click chaos

function activate(activeBall, otherBall, content) {
  if (clicked) return;
  clicked = true;

  // fade out the other ball
  otherBall.classList.add("fade-out");

  // make background black
  document.body.classList.add("black");

  // expand clicked ball
  activeBall.classList.add("expand");

  // show content
  setTimeout(() => {
    content.classList.add("show");
  }, 600);
}

ball1.onclick = () => activate(ball1, ball2, content1);
ball2.onclick = () => activate(ball2, ball1, content2);
</script>

</body>
</html>
