<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% blocktitle %}nav{% endblock %}</title>
</head>
<body>
    {% block navbar %}
    <style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    min-height: 200vh;
    font-family: Arial, sans-serif;
    color: white;
    background:
      radial-gradient(circle at 20% 30%, rgba(120,80,20,0.22), transparent 40%),
      radial-gradient(circle at 80% 20%, rgba(20,40,90,0.18), transparent 40%),
      linear-gradient(180deg, #070707, #0b0b0b 40%, #10131a 100%);
    position: relative;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      repeating-linear-gradient(90deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 6px),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 5px);
    opacity: 0.25;
    pointer-events: none;
    mix-blend-mode: soft-light;
  }

  .blur-orb {
    position: fixed;
    top: 120px;
    right: 8%;
    width: 320px;
    height: 320px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(212,160,23,0.22), rgba(40,60,120,0.08), transparent 70%);
    filter: blur(60px);
    opacity: 0.7;
    pointer-events: none;
  }

  .navbar {
    position: sticky;
    top: 18px;
    width: calc(100% - 48px);
    margin: 18px auto;
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 24px;
    background: rgba(20,20,20,0.42);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.25);
    z-index: 10;
    overflow: hidden;
  }

  .navbar::before {
    content: "";
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(90deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 8px);
    opacity: 0.35;
    pointer-events: none;
  }

  .logo {
    position: relative;
    font-size: 28px;
    font-family: serif;
    color: #d4a017;
    letter-spacing: 1px;
  }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 28px;
    position: relative;
  }

  .nav-links a {
    position: relative;
    color: rgba(255,255,255,0.88);
    text-decoration: none;
    font-size: 15px;
    transition: color 0.3s ease;
  }

  .nav-links a::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -6px;
    width: 0;
    height: 2px;
    background: #d4a017;
    transition: width 0.35s ease;
  }

  .nav-links a:hover {
    color: #ffffff;
  }

  .nav-links a:hover::after,
  .nav-links a.active::after {
    width: 100%;
  }

  .signup-btn {
    padding: 12px 20px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.16);
    background: rgba(255,255,255,0.08);
    color: white;
    backdrop-filter: blur(10px);
    cursor: pointer;
  }

  .hero-space {
    padding: 140px 60px;
  }

  .hero-space h1 {
    font-size: 92px;
    font-family: serif;
    color: rgba(255,255,255,0.92);
  }
</style>
</head>
<body>
  <div class="blur-orb"></div>

  <nav class="navbar">
    <div class="logo">Echoes</div>
    <div class="nav-links">
      <a href="#" class="active">The Journey</a>
      <a href="#">Year Book</a>
      <a href="#">Vault</a>
      <a href="#">The Wall</a>
      <button class="signup-btn">Sign Up</button>
    </div>
  </nav>

  <section class="hero-space">
    <h1>The Journey Begins</h1>
  </section>
  
    {% endblock %}    
</body>
</html>
