<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wizarding Timeline 2025–2029</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:radial-gradient(circle at top,#16111f,#09070d 70%);
  color:#f8f1d4;
  font-family:'Cinzel',serif;
  overflow-x:hidden;
}
.scroll-space{height:600vh}
.stage{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
.stage::before{
  content:'';
  position:absolute;inset:0;
  background:radial-gradient(circle,rgba(255,215,120,.08),transparent 60%);
  animation:glow 6s ease-in-out infinite;
}
@keyframes glow{50%{opacity:.5}}
.card{
  width:min(1100px,90vw);
  height:72vh;
  border:1px solid rgba(255,215,120,.18);
  border-radius:30px;
  background:rgba(20,14,26,.72);
  backdrop-filter:blur(12px);
  box-shadow:0 0 80px rgba(255,215,120,.08), inset 0 0 30px rgba(255,255,255,.03);
  display:grid;
  grid-template-columns:1fr 1fr;
  padding:50px;
  gap:30px;
}
.left{display:flex;flex-direction:column;justify-content:center;z-index:2}
.left h1{
  font-size:clamp(5rem,10vw,8rem);
  color:#f4d06f;
  text-shadow:0 0 20px rgba(255,215,120,.35);
}
.left h2{font-size:clamp(1.6rem,3vw,3rem);margin-top:10px}
.left p{margin-top:20px;line-height:1.9;font-size:1.08rem;color:#e8dcc0;max-width:500px}
.magic-scene{position:relative}
.floating{
  position:absolute;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.12);
  box-shadow:0 15px 40px rgba(0,0,0,.4);
  animation:float 5s ease-in-out infinite;
}
@keyframes float{50%{transform:translateY(-14px) rotate(2deg)}}
.castle{width:58%;height:52%;left:0;top:5%;background:linear-gradient(135deg,#2a2438,#111827)}
.book{width:44%;height:34%;right:0;top:20%;background:linear-gradient(135deg,#7c3aed,#2e1065)}
.wand{width:60%;height:28%;left:18%;bottom:8%;background:linear-gradient(135deg,#d4a017,#5b3a00)}
.stars span{
  position:absolute;
  width:4px;height:4px;border-radius:50%;
  background:#fff4c2;
  box-shadow:0 0 10px #fff4c2;
  animation:twinkle 2s infinite alternate;
}
@keyframes twinkle{from{opacity:.2}to{opacity:1}}
.progress{
  position:fixed;left:50px;top:50%;transform:translateY(-50%);
  width:6px;height:280px;border-radius:999px;
  background:rgba(255,255,255,.08);overflow:hidden;
}
.fill{width:100%;height:0;background:linear-gradient(to bottom,#f4d06f,#fff8d6)}
</style>
</head>
<body>
<div class="progress"><div class="fill" id="fill"></div></div>
<div class="scroll-space"></div>
<div class="stage">
  <div class="card">
    <div class="left">
      <h1 id="year">2025</h1>
      <h2 id="title">The Sorting Begins</h2>
      <p id="desc">The first magical chapter opens — new faces, first friendships, and a castle full of untold memories waiting to be written.</p>
    </div>
    <div class="magic-scene">
      <div class="floating castle"></div>
      <div class="floating book"></div>
      <div class="floating wand"></div>
      <div class="stars">
        <span style="top:10%;left:20%"></span>
        <span style="top:30%;left:80%"></span>
        <span style="top:70%;left:60%"></span>
        <span style="top:50%;left:30%"></span>
      </div>
    </div>
  </div>
</div>
<script>
const timeline=[
{year:'2025',title:'The Sorting Begins',desc:'The first magical chapter opens — new faces, first friendships, and a castle full of untold memories waiting to be written.'},
{year:'2026',title:'The Chamber of Secrets',desc:'Inside hidden corridors of campus life, the strongest friendships and funniest secrets were discovered.'},
{year:'2027',title:'The Prisoner of Nostalgia',desc:'The golden middle year — trips, laughter, midnight chaos, and unforgettable snapshots frozen in time.'},
{year:'2028',title:'The Half-Blood Legacy',desc:'Now seniors, every corner held history. Juniors looked up as your legend quietly formed.'},
{year:'2029',title:'The Deathly Echoes',desc:'The final chapter of the school years, where memories became magic powerful enough to outlive time itself.'}
];
const year=document.getElementById('year');
const title=document.getElementById('title');
const desc=document.getElementById('desc');
const fill=document.getElementById('fill');
window.addEventListener('scroll',()=>{
 const max=document.body.scrollHeight-window.innerHeight;
 const progress=window.scrollY/max;
 const index=Math.min(timeline.length-1,Math.floor(progress*timeline.length));
 const item=timeline[index];
 fill.style.height=(progress*100)+'%';
 year.textContent=item.year;
 title.textContent=item.title;
 desc.textContent=item.desc;
});
</script>
</body>
</html>
