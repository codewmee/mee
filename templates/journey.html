<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Echoes - Journey</title>
<style>
    ::selection {
  background: rgba(212,160,23,0.45);
  color: #fff7d6;
}

::-moz-selection {
  background: rgba(212,160,23,0.45);
  color: #fff7d6;
}

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    min-height: 200vh;
    font-family: Arial, sans-serif;
    color: white;
    background:
      radial-gradient(circle at 20% 30%, rgba(120,80,20,0.22), transparent 40%),
      radial-gradient(circle at 80% 20%, rgba(20,40,90,0.18), transparent 40%),
      linear-gradient(180deg, #070707, #0b0b0b 40%, #10131a 100%);
    position: relative;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      repeating-linear-gradient(90deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 6px),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 5px);
    opacity: 0.25;
    pointer-events: none;
    mix-blend-mode: soft-light;
  }

  .blur-orb {
    position: fixed;
    top: 120px;
    right: 8%;
    width: 320px;
    height: 320px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(212,160,23,0.22), rgba(40,60,120,0.08), transparent 70%);
    filter: blur(60px);
    opacity: 0.7;
    pointer-events: none;
  }

  @keyframes dropFromTop {
    0% { transform: translateY(-100px); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
  }

  @keyframes linkFadeUp {
    0% { transform: translateY(10px); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
  }

  .navbar {
    position: sticky;
    top: 18px;
    width: calc(100% - 48px);
    margin: 18px auto;
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 24px;
    background: rgba(20,20,20,0.42);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.25);
    z-index: 10;
    overflow: hidden;
    animation: dropFromTop 0.8s ease-out forwards;
  }

  .navbar::before {
    content: "";
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(90deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 8px);
    opacity: 0.35;
    pointer-events: none;
  }

  .logo {
    position: relative;
    font-size: 28px;
    font-family: serif;
    color: #d4a017;
    letter-spacing: 1px;
    cursor: pointer;
  }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 28px;
    position: relative;
  }

  .nav-links a {
    position: relative;
    color: rgba(255,255,255,0.88);
    text-decoration: none;
    font-size: 15px;
    transition: color 0.3s ease;
    opacity: 0;
    transform: translateY(10px);
    animation: linkFadeUp 0.6s forwards;
  }

  .nav-links a:nth-child(1) { animation-delay: 0.3s; }
  .nav-links a:nth-child(2) { animation-delay: 0.45s; }
  .nav-links a:nth-child(3) { animation-delay: 0.6s; }
  .nav-links a:nth-child(4) { animation-delay: 0.75s; }

  .nav-links a::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -6px;
    width: 0;
    height: 2px;
    background: #d4a017;
    transition: width 0.35s ease;
  }

  .nav-links a:hover,
  .nav-links a.active {
    color: #ffffff;
  }

  .nav-links a:hover::after,
  .nav-links a.active::after {
    width: 100%;
  }

  .signup-btn {
    padding: 12px 20px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.16);
    background: rgba(255,255,255,0.08);
    color: white;
    backdrop-filter: blur(10px);
    cursor: pointer;
    opacity: 0;
    transform: translateY(10px);
    animation: linkFadeUp 0.6s 0.9s forwards;
  }

  .hero-space {
    padding: 140px 60px;
  }

  .hero-space h1 {
    font-size: 92px;
    font-family: serif;
    color: rgba(255,255,255,0.92);
  }

  a { text-decoration: none; }

  /* WORKING AUTH MODAL */
  .auth-popup {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 3000;
  }

  .auth-popup.active {
    display: flex;
  }

  .auth-card {
    width: 90%;
    max-width: 560px;
    padding: 32px;
    border-radius: 28px;
    position: relative;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    animation: authFade 0.35s ease;
  }

  @keyframes authFade {
    from { opacity: 0; transform: translateY(20px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .close-auth {
    position: absolute;
    top: 14px;
    right: 16px;
    width: 38px;
    height: 38px;
    border: none;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    color: white;
    font-size: 1.3rem;
    cursor: pointer;
  }

  .auth-card h2 {
    font-size: 2rem;
    margin-bottom: 8px;
    color: white;
    font-family: serif;
  }

  .auth-card p {
    color: rgba(255,255,255,0.7);
    margin-bottom: 20px;
  }

  .auth-card input,
  .auth-card select {
    width: 100%;
    padding: 14px;
    margin-bottom: 14px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.1);
    outline: none;
    font-size: 1rem;
    background: rgba(255,255,255,0.06);
    color: white;
  }

  .auth-card input::placeholder { color: rgba(255,255,255,0.55); }
  .auth-card select option { background: #111827; }

  .auth-card input:focus,
  .auth-card select:focus {
    border-color: rgba(212,160,23,0.5);
    box-shadow: 0 0 0 3px rgba(212,160,23,0.15);
  }

  .login-btn,
  .create-btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, #d4a017, #ffcc00);
    color: black;
    font-weight: 800;
    cursor: pointer;
    transition: 0.3s ease;
  }

  .login-btn:hover,
  .create-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 24px rgba(212,160,23,0.22);
  }

  .switch-text {
    text-align: center;
    margin-top: 18px;
    color: rgba(255,255,255,0.65);
  }

  .switch-text span {
    color: #ffcc00;
    font-weight: 700;
    cursor: pointer;
  }

  .signup-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 14px;
  }
</style>
</head>
<body>
  <div class="blur-orb"></div>

  <nav class="navbar">
    <a href="/"><div class="logo">Echoes</div></a>
    <div class="nav-links">
      <a href="/journey" class="active">The Journey</a>
      <a href="/yearbook">Year Book</a>
      <a href="/vault">vault</a>
      <a href="/wall">The Wall</a>
      <button class="signup-btn" onclick="openSignup()">Sign Up</button>
    </div>
  </nav>

  <div class="auth-popup" id="authPopup">
    <div class="auth-card">
      <button class="close-auth" onclick="closeSignup()">&times;</button>

      <div id="loginForm">
        <h2>Welcome Back</h2>
        <p>Login to continue your Echoes journey.</p>
        <input type="email" placeholder="Email Address">
        <input type="password" placeholder="Password">
        <button class="login-btn" onclick="showLoginSuccess()">Login</button>
        <div class="switch-text">
          Don’t have an account?
          <span onclick="showSignup()">Create one</span>
        </div>
      </div>

      <div id="signupForm" style="display:none;">
        <h2>Create Account</h2>
        <p>Join Echoes and preserve your memories forever.</p>
        <div class="signup-grid">
          <input type="text" placeholder="Full Name">
          <input type="email" placeholder="Email Address">
          <select>
            <option selected disabled>Select Branch</option>
            <option>ECS</option>
            <option>Civil</option>
            <option>Mechanical</option>
            <option>AIDS</option>
            <option>Computer</option>
          </select>
          <input type="text" placeholder="Roll Number">
        </div>
        <input type="password" placeholder="Create Password">
        <button class="create-btn" onclick="showSignupSuccess()">Create Account</button>
        <div class="switch-text">
          Already have an account?
          <span onclick="showLogin()">Login</span>
        </div>
      </div>
    </div>
  </div>

  <section class="hero-space">
    <h1>The Journey Begins</h1>
  </section>

<script>
function openSignup() {
  document.getElementById('authPopup').classList.add('active');
  showLogin();
}

function closeSignup() {
  document.getElementById('authPopup').classList.remove('active');
}

function showSignup() {
  document.getElementById('loginForm').style.display = 'none';
  document.getElementById('signupForm').style.display = 'block';
}

function showLogin() {
  document.getElementById('signupForm').style.display = 'none';
  document.getElementById('loginForm').style.display = 'block';
}

function showLoginSuccess() {
  alert('Login button working ✨ Connect Flask route next');
}

function showSignupSuccess() {
  alert('Signup button working 🎓 Connect DB next');
}

window.addEventListener('click', function(e) {
  const popup = document.getElementById('authPopup');
  if (e.target === popup) closeSignup();
});
</script>
</body>
</html>
