<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Echoes</title>
  <link rel="stylesheet" href="../static/css/style.css"/>
</head>
<body>
  <div class="navbar">
    <button class="login-btn" onclick="toggleModal()">Student Login</button>
  </div>
 
  <section class="hero">
    <p class="subtitle-top">A Journey We'll Always Carry</p>
    <h1 class="title">Batch <span>2025-2029</span></h1>
    <div class="line"></div>
    <p class="description">
      Four years of laughter, late nights, and lessons learned. Join us as we
      look back on the moments that defined us.
    </p>
 
    <div class="journey-wrap" onclick="window.location.href='/journey'">
      <div class="journey">Click to start the journey</div>
      <div class="vertical-line"></div>
    </div>
  </section>
 
  <div class="modal-overlay" id="loginModal">
    <div class="modal-card">
      <span class="close-modal" onclick="toggleModal()">&times;</span>
      <h2 style="color:#d4a017; font-size:48px;">Welcome Back</h2>
      <p>Sign in to access your digital yearbook</p>
 
      <form id="authForm" method="POST" action="/login">
        <div id="loginFields">
          <div class="form-group">
            <input type="email" name="email" placeholder="Email Address" required>
          </div>
          <div class="form-group">
            <input type="password" name="password" placeholder="Password" required>
          </div>
        </div>
 
        <div id="signupFields" style="display:none;">
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px;">
            <input type="text" name="full_name" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email Address" required>
            <select name="branch" required>
              <option selected>ECS</option>
              <option>CS</option>
              <option>AIDS</option>
              <option>MECH</option>
              <option>CIVIL</option>
            </select>
            <input type="text" name="roll" placeholder="Roll Number" required>
          </div>
          <div class="form-group" style="margin-top:14px;">
            <input type="password" name="password" placeholder="Create Password" required
              pattern="(?=.*[A-Z])(?=.*[0-9])(?=.*[^A-Za-z0-9]).{8,}"
              title="Use 1 uppercase, 1 number, 1 symbol, min 8 chars">
          </div>
        </div>
 
        <button type="submit" class="signin-btn" id="authBtn" value="login">Sign In</button>
      </form>
 
      <div class="footer-text" id="authFooter">
        Don't have an account? <span onclick="toggleSignup()" style="cursor:pointer;">Create one</span>
      </div>
    </div>
  </div>
 
  <script src="../static/js/script.js"></script>
</body>
</html>
