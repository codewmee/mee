<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Echoes</title>
  <style>
    ::selection {
      background: rgba(212,160,23,0.45);
      color: #fff7d6;
    }

    ::-moz-selection {
      background: rgba(212,160,23,0.45);
      color: #fff7d6;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      animation: pageEnter 1.2s cubic-bezier(0.22, 1, 0.36, 1);

      min-height: 100vh;
      background:
        radial-gradient(circle at 25% 50%, rgba(120, 80, 20, 0.28), transparent 45%),
        radial-gradient(circle at 75% 50%, rgba(20, 40, 90, 0.22), transparent 45%),
        linear-gradient(90deg, #1a140d 0%, #0a0a0a 50%, #07111f 100%);
      color: white;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,0.03) 0px,
          rgba(255,255,255,0.03) 1px,
          transparent 1px,
          transparent 6px
        ),
        repeating-linear-gradient(
          0deg,
          rgba(255,255,255,0.015) 0px,
          rgba(255,255,255,0.015) 1px,
          transparent 1px,
          transparent 4px
        );
      opacity: 0.35;
      mix-blend-mode: soft-light;
      pointer-events: none;
    }

    .navbar {
      opacity: 0;
      animation: fadeDrop 0.8s ease 2.0s forwards;

      display: flex;
      justify-content: flex-end;
      padding: 30px 50px;
    }

    .login-btn {
      padding: 12px 24px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.12), 0 8px 24px rgba(0,0,0,0.25);
      color: white;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .login-btn:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.28);
      transform: translateY(-1px);
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: all 0.45s ease;
      z-index: 100;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-card {
      width: 420px;
      max-width: 90%;
      padding: 38px;
      border-radius: 28px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow: 0 20px 60px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.08);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      transform: scale(0.92) translateY(20px);
      transition: all 0.45s cubic-bezier(0.22,1,0.36,1);
    }

    .modal-overlay.active .modal-card {
      transform: scale(1) translateY(0);
    }

    .modal-card h2 { font-family: serif; font-size: 42px; margin-bottom: 8px; }
    .modal-card p { color: rgba(255,255,255,0.6); margin-bottom: 24px; }
    .form-group input,
    #signupFields input,
    #signupFields select {
      width: 100%; padding: 16px 18px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(0,0,0,0.75);
      color: white;
      outline: none;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

   #signupFields select {
  width: 100%;
  padding: 16px 18px;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.1);
  background-color: #111;
  color: white;
}

#signupFields select option {
  background-color: #111;
  color: white;
}

    .form-group input {
      width: 100%; padding: 16px 18px; margin-bottom: 14px;
      border-radius: 16px; border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.06); color: white; outline: none;
      backdrop-filter: blur(10px);
    }
    .signin-btn {
      width: 100%; padding: 16px; border: none; border-radius: 18px;
      background: linear-gradient(90deg, rgba(212,160,23,0.9), rgba(180,120,40,0.9));
      color: white; font-weight: 600; cursor: pointer; margin-top: 8px;
      box-shadow: 0 10px 30px rgba(212,160,23,0.25);
    }
    .footer-text { margin-top: 18px; color: rgba(255,255,255,0.55); }
    .footer-text span { color: #d4a017; }
    .close-modal { float:right; font-size: 28px; cursor:pointer; color: rgba(255,255,255,0.7); }

    .hero {
      transition: transform 0.7s ease;

      min-height: 80vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    .subtitle-top {
      color: #d4a017;
      font-size: 32px;
      font-style: italic;
      font-family: serif;
      margin-bottom: 20px;
    }

    .title {
      opacity: 0;
      transform: translateY(30px) scale(0.96);
      animation: titlePop 0.9s cubic-bezier(0.22, 1, 0.36, 1) 1.25s forwards;

      font-size: 140px;
      font-family: serif;
      font-weight: 300;
      line-height: 1;
    }

    .title span {
      color: rgba(255,255,255,0.7);
    }

    .line {
      width: 100px;
      height: 1px;
      background: rgba(212,160,23,0.6);
      margin: 40px 0;
    }

    .description {
      opacity: 0;
      transform: translateY(35px);
      animation: descRise 0.8s cubic-bezier(0.22, 1, 0.36, 1) 1.0s forwards;

      max-width: 800px;
      font-size: 28px;
      color: rgba(255,255,255,0.5);
      line-height: 1.6;
    }

    .journey {
      margin-top: 60px;
      font-size: 12px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
    }

    .vertical-line {
      width: 1px;
      height: 60px;
      background: rgba(255,255,255,0.5);
      margin: 20px auto 0;
      animation: pulse 1.5s infinite;
    }

    .journey-wrap {
      opacity: 0;
      transform: translateY(40px);
      animation: bottomRise 0.9s cubic-bezier(0.22, 1, 0.36, 1) 3.0s forwards;

      margin-top: 60px;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
    }

    .hero:has(.journey-wrap:hover) {
      transform: scale(1.04);
    }

    .journey-wrap:hover .journey {
      color: #d4a017;
      transition: color 0.4s ease;
    }

    .journey-wrap:hover .vertical-line {
      background: #d4a017;
      box-shadow: 0 0 12px rgba(212,160,23,0.6);
    }

    @keyframes titlePop {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes fadeDrop {
      from {
        opacity: 0;
        transform: translateY(-18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes descRise {
      from {
        opacity: 0;
        transform: translateY(35px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes bottomRise {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pageEnter {
      0% {
        transform: scale(1.06);
        opacity: 0.85;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .page-exit {
      animation: pageExit 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes pageExit {
      from {
        transform: scale(1);
        opacity: 1;
      }
      to {
        transform: scale(0.97);
        opacity: 0.92;
      }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    @media (max-width: 768px) {
      .title {
        font-size: 70px;
      }

      .description {
        font-size: 18px;
      }

      .subtitle-top {
        font-size: 22px;
      }
    }
    .link_to {
      text-decoration: none;
      display: grid;
      flex-direction: column;
    }
  </style>
</head>
<body>
  <div class="navbar">
    <button class="login-btn" onclick="toggleModal()">Student Login</button>
  </div>

  <section class="hero">
    <p class="subtitle-top">A Journey We’ll Always Carry</p>
    <h1 class="title">Batch <span>2022—26</span></h1>
    <div class="line"></div>
    <p class="description">
      Four years of laughter, late nights, and lessons learned. Join us as we
      look back on the moments that defined us.
    </p>

    <div class="journey-wrap">
        <a href="/journey" class="link_to">
      <div class="journey">Click to start the journey</div>
      <div class="vertical-line"></div></a>
    </div>
  </section>
  <script>
    document.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', function (e) {
        const href = this.getAttribute('href');
        if (!href || href.startsWith('#')) return;
        e.preventDefault();
        document.body.classList.add('page-exit');
        setTimeout(() => {
          window.location.href = href;
        }, 700);
      });
    });
  </script>
  <div class="modal-overlay" id="loginModal">
    <div class="modal-card">
      <span class="close-modal" onclick="toggleModal()">&times;</span>
      <h2 style="color:#d4a017; font-size:48px;">Welcome Back</h2>
      <p>Sign in to access your digital yearbook</p>

   <!-- LOGIN FORM -->
<form id="authForm" method="POST" action="/login">
  <div id="loginFields">
    <div class="form-group">
      <input type="email" name="email" placeholder="Email Address" required>
    </div>
    <div class="form-group">
      <input type="password" name="password" placeholder="Password" required>
    </div>
  </div>

  <!-- SIGNUP FIELDS -->
  <div id="signupFields" style="display:none;">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px;">
      <input type="text" name="full_name" placeholder="Full Name" required>
      <input type="email" name="email" placeholder="Email Address" required>
      <select name="branch" required>
        <option selected>ECS</option>
        <option>CS</option>
        <option>AIDS</option>
        <option>MECH</option>
        <option>CIVIL</option>
      </select>
      <input type="text" name="roll" placeholder="Roll Number" required>
    </div>
    <div class="form-group" style="margin-top:14px;">
      <input type="password" name="password" placeholder="Create Password" required pattern="(?=.*[A-Z])(?=.*[0-9])(?=.*[^A-Za-z0-9]).{8,}" title="Use 1 uppercase, 1 number, 1 symbol, min 8 chars">
    </div>
  </div>

  <button type="submit" class="signin-btn" id="authBtn" value="login">Sign In</button>
</form>

      <div class="footer-text" id="authFooter">Don't have an account? <span onclick="toggleSignup()" style="cursor:pointer;">Create one</span></div>
    </div>
  </div>

  <script>
  
function toggleModal() {
  document.getElementById("loginModal").classList.toggle("active");
}

function toggleSignup() {
  const login = document.getElementById("loginFields");
  const signup = document.getElementById("signupFields");
  const btn = document.getElementById("authBtn");
  const form = document.getElementById("authForm");
  const heading = document.querySelector(".modal-card h2");
  const sub = document.querySelector(".modal-card p");
  const footer = document.getElementById("authFooter");

  const signupOpen = signup.style.display === "block";

  if (!signupOpen) {
    login.style.display = "none";
    signup.style.display = "block";
    btn.textContent = "Create Account";
    form.action = "/signup";

    heading.textContent = "Create Account";
    sub.textContent = "Complete your details to access the digital archive";

    footer.innerHTML =
      'Already have an account? <span onclick="toggleSignup()" style="cursor:pointer;">Sign In</span>';
  } else {
    login.style.display = "block";
    signup.style.display = "none";
    btn.textContent = "Sign In";
    form.action = "/login";

    heading.textContent = "Welcome Back";
    sub.textContent = "Sign in to access your digital yearbook";

    footer.innerHTML =
      'Dont have an account? <span onclick="toggleSignup()" style="cursor:pointer;">Create one</span>';
  }
}

  </script>
 
</body>
</html>
